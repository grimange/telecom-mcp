name: CI

on:
  pull_request:
  push:
    tags-ignore:
      - "v*"

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev] build twine

      - name: Lint (ruff)
        run: ruff check .

      - name: Transport contract (mcp initialize)
        run: pytest -q tests/test_mcp_stdio_initialize.py

      - name: Test (pytest)
        run: pytest

      - name: Build package
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*
