name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Validate tag matches pyproject version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["TAG_NAME"]
          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          version = str(project["version"])
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(
                  f"Tag/version mismatch: tag={tag!r}, expected={expected!r} from pyproject.toml"
              )
          print(f"Release identity validated: {tag} matches project.version={version}")
          PY

      - name: Build artifacts
        run: |
          python -m build
          ls -lah dist

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Generate artifact manifest
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --title "$TAG_NAME" \
            --generate-notes
