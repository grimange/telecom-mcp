targets:
  - id: pbx-1
    type: asterisk
    host: 10.0.0.10
    environment: lab
    safety_tier: lab_safe
    allow_active_validation: true
    ari:
      url: http://10.0.0.10:8088
      username_env: AST_ARI_USER_PBX1
      password_env: AST_ARI_PASS_PBX1
      app: telecom_mcp
    ami:
      host: 10.0.0.10
      port: 5038
      username_env: AST_AMI_USER_PBX1
      password_env: AST_AMI_PASS_PBX1
    logs:
      path: /var/log/asterisk/full
      source_command: tail -n 200 /var/log/asterisk/full

  - id: fs-1
    type: freeswitch
    host: 10.0.0.20
    environment: lab
    safety_tier: lab_safe
    allow_active_validation: true
    esl:
      host: 10.0.0.20
      port: 8021
      password_env: FS_ESL_PASS_FS1
    logs:
      path: /var/log/freeswitch/freeswitch.log
      source_command: tail -n 200 /var/log/freeswitch/freeswitch.log
